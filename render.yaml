services:
  - type: web
    name: productivity-assistant
    env: python
    region: oregon
    plan: free
    runtime: python-3.10
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT --root-path /"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
