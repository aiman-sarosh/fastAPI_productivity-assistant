<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productivity Assistant WebSocket Test</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #4b0082, #7b2ff7, #c471ed);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 2rem;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .card {
            flex: 1;
            min-width: 220px;
            background: rgba(255,255,255,0.12);
            padding: 20px;
            border-radius: 18px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
        }

        .dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: red;
            transition: 0.3s;
        }

        .dot.connected {
            background: #00ff99;
            box-shadow: 0 0 12px #00ff99;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            border: none;
            padding: 14px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.25s ease;
            color: white;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .connect {
            background: linear-gradient(135deg, #00c853, #00e676);
        }

        .disconnect {
            background: linear-gradient(135deg, #d50000, #ff5252);
        }

        .email {
            background: linear-gradient(135deg, #2979ff, #651fff);
        }

        .meeting {
            background: linear-gradient(135deg, #ff6d00, #ff9100);
        }

        .clear {
            background: linear-gradient(135deg, #616161, #9e9e9e);
        }

        .messages {
            background: rgba(255,255,255,0.12);
            border-radius: 18px;
            padding: 20px;
            height: 400px;
            overflow-y: auto;
        }

        .message {
            background: rgba(255,255,255,0.1);
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .message-time {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 5px;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>🚀 Productivity Assistant</h1>

        <div class="top-bar">

            <div class="card">
                <div class="status">
                    <div id="statusDot" class="dot"></div>
                    <span id="statusText">Disconnected</span>
                </div>
            </div>

            <div class="card">
                <div class="stats">
                    <div>
                        <strong>Messages</strong>
                        <div id="messageCount">0</div>
                    </div>

                    <div>
                        <strong>Connected Since</strong>
                        <div id="connectionTime">--</div>
                    </div>
                </div>
            </div>

        </div>

        <div class="buttons">
            <button class="connect" onclick="connectWebSocket()">Connect</button>
            <button class="disconnect" onclick="disconnectWebSocket()">Disconnect</button>
            <button class="email" onclick="sendFakeEmail()">Send Email</button>
            <button class="meeting" onclick="sendFakeMeeting()">Send Meeting</button>
            <button class="clear" onclick="clearMessages()">Clear</button>
        </div>

        <div class="messages" id="messages"></div>

    </div>

    <script>

        let socket = null;
        let messageCounter = 0;

        const messagesDiv = document.getElementById("messages");
        const statusDot = document.getElementById("statusDot");
        const statusText = document.getElementById("statusText");
        const messageCount = document.getElementById("messageCount");
        const connectionTime = document.getElementById("connectionTime");

        function updateStatus(connected) {
            if (connected) {
                statusDot.classList.add("connected");
                statusText.textContent = "Connected";
                connectionTime.textContent = new Date().toLocaleTimeString();
            } else {
                statusDot.classList.remove("connected");
                statusText.textContent = "Disconnected";
                connectionTime.textContent = "--";
            }
        }

        function addMessage(text) {

            messageCounter++;
            messageCount.textContent = messageCounter;

            const div = document.createElement("div");
            div.className = "message";

            div.innerHTML = `
                <div>${text}</div>
                <div class="message-time">${new Date().toLocaleTimeString()}</div>
            `;

            messagesDiv.prepend(div);
        }

        function connectWebSocket() {

            if (socket && socket.readyState === WebSocket.OPEN) {
                return;
            }

            socket = new WebSocket("ws://localhost:8000/ws");

            socket.onopen = () => {
                updateStatus(true);
                addMessage("🟢 WebSocket Connected");
            };

            socket.onmessage = (event) => {
                addMessage(event.data);
            };

            socket.onclose = () => {
                updateStatus(false);
                addMessage("🔴 WebSocket Disconnected");
            };

            socket.onerror = () => {
                addMessage("⚠️ WebSocket Error");
            };
        }

        function disconnectWebSocket() {
            if (socket) {
                socket.close();
            }
        }

        async function sendFakeEmail() {
            await fetch("http://localhost:8000/fake-email", {
                method: "POST"
            });
        }

        async function sendFakeMeeting() {
            await fetch("http://localhost:8000/fake-meeting", {
                method: "POST"
            });
        }

        function clearMessages() {
            messagesDiv.innerHTML = "";
            messageCounter = 0;
            messageCount.textContent = 0;
        }

        // Auto-connect on page load
        window.onload = () => {
            connectWebSocket();
        };

    </script>

</body>
</html>
